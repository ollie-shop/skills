version: 1.0.0
description: >
  Canonical slot registry for the Ollie Shop default template.
  Each entry represents one <Slot id="..."> injection point.
  Agents must load this file to validate slot IDs and understand rendering behavior.
  Do not resolve slots from memory — every slot ID must exist as an `id` entry here.

schema:
  id: unique slot identifier string
  step: "cart | shipping | address | payment | confirmation | global | on-action"
  mount_phase: "matches mount_phase vocabulary: global | step:cart | step:shipping | step:address | step:payment | step:confirmation | on-action"
  visibility: "always | conditional"
  visibility_type: "always | user-interaction | data-state | device"
  visibility_trigger: "exact source condition or null"
  device_constraint: "null | mobile-only | desktop-only"
  default_content: short description of what renders by default
  context_props: list of props passed to the slot (empty list if none)
  shared_contexts: list of files/pages where this slot ID appears simultaneously (empty if only one)
  use_when: null  # agent guidance — when to place a component here (to be filled)
  notes: additional architectural notes or null

# ─────────────────────────────────────────────
# GLOBAL SLOTS
# ─────────────────────────────────────────────

slots:

  - id: header
    step: global
    mount_phase: global
    visibility: always
    visibility_type: always
    visibility_trigger: null
    device_constraint: null
    default_content: "StepHeader (logo + login) on checkout detail pages; custom header row on cart page"
    context_props: []
    shared_contexts: [CartPage.tsx, LayoutWrapper.tsx]
    use_when: null
    notes: "Same slot ID renders in two different locations simultaneously. A custom component registered here appears in BOTH the cart page and all checkout detail pages."

  - id: checkout_header_full_page
    step: global
    mount_phase: global
    visibility: always
    visibility_type: always
    visibility_trigger: null
    device_constraint: null
    default_content: "Empty — full-width banner area above the two-column layout"
    context_props: []
    shared_contexts: []
    use_when: null
    notes: "Void slot. Only renders when displayMode !== 'Full'."

  - id: checkout_summaries
    step: global
    mount_phase: global
    visibility: always
    visibility_type: always
    visibility_trigger: null
    device_constraint: null
    default_content: "SummariesManager — contact and shipping summary cards shown after each step completes"
    context_props: []
    shared_contexts: []
    use_when: null
    notes: "The slot always renders. Its default child (SummariesManager) is guarded by previousSummaries?.length — so the default content may be empty, but a custom component injected here is always mounted."

  - id: checkout_sidebar
    step: global
    mount_phase: global
    visibility: conditional
    visibility_type: device
    visibility_trigger: "Parent div has 'hidden lg:flex' — only visible on lg screens and above"
    device_constraint: desktop-only
    default_content: "CheckoutSidebar — totalizer, coupon form, proceed button"
    context_props: []
    shared_contexts: []
    use_when: null
    notes: null

  - id: checkout_sidebar_login
    step: global
    mount_phase: global
    visibility: conditional
    visibility_type: data-state
    visibility_trigger: "props?.flags?.showLoginOnSidebar === true"
    device_constraint: null
    default_content: "UserLogin component"
    context_props: []
    shared_contexts: []
    use_when: null
    notes: null

  - id: checkout_coupon_form
    step: global
    mount_phase: global
    visibility: always
    visibility_type: always
    visibility_trigger: null
    device_constraint: null
    default_content: "CouponForm input"
    context_props: []
    shared_contexts: [CheckoutSidebar.tsx]
    use_when: null
    notes: null

  - id: checkout_sidebar_totalizer
    step: global
    mount_phase: global
    visibility: always
    visibility_type: always
    visibility_trigger: null
    device_constraint: null
    default_content: "Totalizer — full price table"
    context_props: []
