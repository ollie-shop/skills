    visibility_type: always
    visibility_trigger: null
    device_constraint: null
    default_content: "Empty — reserved space for custom CTA"
    context_props: []
    shared_contexts: []
    use_when: null
    notes: "Void slot. No default content."

  - id: step_navigation
    step: global
    mount_phase: global
    visibility: conditional
    visibility_type: data-state
    visibility_trigger: "showNavigation: (hasEmail && hasValidAddresses && hasQuotes). When false, parent nav is md:hidden"
    device_constraint: null
    default_content: "Prev/next navigation buttons row"
    context_props: [onToggleSummary]
    shared_contexts: []
    use_when: null
    notes: "Slot itself has no conditional — the parent nav element carries the md:hidden class when showNavigation is false."

  - id: step_navigation_place_order_button
    step: global
    mount_phase: global
    visibility: conditional
    visibility_type: data-state
    visibility_trigger: "!nextStep?.id — only renders as 'place order' when the user is on the last step (no next step). Button hidden when hideSubmit is true or when a custom NextStepButtonElement is active."
    device_constraint: null
    default_content: "Place Order / Complete Order button — label changes to 'Complete Order with {paymentMethod}' when a payment method is selected"
    context_props: []
    shared_contexts: []
    use_when: null
    notes: "Registered in admin slot registry (group: Payment) but NOT implemented as a <Slot> in the template. The button lives inline inside StepNavigation.tsx as a plain <Button> within the parent <Slot id='step_navigation'>. Customizing this slot ID has no effect in the current default template — override step_navigation instead to replace the entire nav bar including this button."

  - id: step_navigation_total_label
    step: global
    mount_phase: global
    visibility: always
    visibility_type: always
    visibility_trigger: null
    device_constraint: null
    default_content: "Total price label inside step navigation bar"
    context_props: [handleToggleSummary]
    shared_contexts: []
    use_when: null
    notes: "Default child has 'sm:hidden' — only visible below sm breakpoint. The slot itself always renders."

  - id: contact_summary
