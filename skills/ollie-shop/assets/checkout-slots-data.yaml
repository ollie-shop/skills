    device_constraint: null
    default_content: "Contact summary card shown after the contact/shipping step completes"
    context_props: []
    shared_contexts: []
    use_when: null
    notes: "Dynamic slot ID generated by SummariesManager. Only rendered when the step has a summary defined."

  - id: shipping_summary
    step: global
    mount_phase: global
    visibility: conditional
    visibility_type: data-state
    visibility_trigger: "step.summary must be defined (SummariesManager dynamic slot ID)"
    device_constraint: null
    default_content: "Shipping summary card shown after shipping is selected"
    context_props: []
    shared_contexts: []
    use_when: null
    notes: "Dynamic slot ID generated by SummariesManager. Same mechanism as contact_summary."

  - id: footer
    step: global
    mount_phase: global
    visibility: always
    visibility_type: always
    visibility_trigger: null
    device_constraint: null
    default_content: "Footer links content"
    context_props: []
    shared_contexts: []
    use_when: null
    notes: "Void slot — default child of footer_sidebar."

  - id: footer_all_container
    step: global
    mount_phase: global
    visibility: always
    visibility_type: always
    visibility_trigger: null
    device_constraint: null
    default_content: "Full footer wrapper"
    context_props: []
    shared_contexts: []
    use_when: null
    notes: null

  - id: footer_sidebar
