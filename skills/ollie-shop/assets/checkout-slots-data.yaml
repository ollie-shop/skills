    default_content: "h1 delivery options heading"
    context_props: []
    shared_contexts: [Shipping.tsx, ListPackages.tsx]
    use_when: null
    notes: "Appears in two files with different conditions. Both must be true for the slot to render in its respective context."

  - id: shipping_list_packages
    step: shipping
    mount_phase: step:shipping
    visibility: conditional
    visibility_type: data-state
    visibility_trigger: "delivery: shippingData.delivery.packages.length > 0 | pick_up: shippingData.pick_up.packages?.length > 0 | digital: shippingData.digital.packages.length > 0"
    device_constraint: null
    default_content: "Shipping package list (SLAs)"
    context_props: [type]
    shared_contexts: []
    use_when: null
    notes: "Rendered up to three times in ListPackages.tsx — type='delivery', type='pick_up', and type='digital'. Each is guarded by its respective package list length. Digital packages are never produced by platform parsing; they only exist when a custom function sets package type 'digital', and the default content is an info banner (immediate delivery by email) plus an items gallery (no address, no shipping options)."

