    visibility_trigger: null
    device_constraint: null
    default_content: "Empty"
    context_props: [item]
    context_props_shape:
      item:
        id: "string — SKU identifier"
        name: "string — e.g. 'Ollie Power Bank Branco - 20000mah'"
        variant: "string — variant label, e.g. 'Branco - 20000mah'"
        brand: "string"
        category: "string"
        quantity: "number — current cart quantity"
        price: "number — UNIT PRICE IN CENTS (20000 = $200.00)"
        originalPrice: "number — list price in cents"
        available: "boolean — false when out of stock / region-restricted"
        index: "number — position in session.cartItems (use for UPDATE_ITEMS_QUANTITY)"
        image: "string — product image URL"
        uniqueId: "string — VTEX orderForm line identifier (e.g. 'BE128F87...')"
        url: "string — PDP path"
    shared_contexts: []
    use_when: null
    notes: |
      Rendered inside cart_item default content, once per item. **Context
      props arrive at the TOP LEVEL of the component signature, not inside
      `props`** (see sdk-guide.md §Slot context props vs admin props).
      Availability signal is `item.available === false`, not `isUnavailable`.
      Prices are in cents — divide by 100 for display.

